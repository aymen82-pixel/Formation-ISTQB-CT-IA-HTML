<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CT-AI — Banque de QCM</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="lesson-modal.css">
<script src="theme.js"></script>
</head>
<body>
<div class="container">

<header>
  <div>
    <a href="index.html" class="back-link">← Hub de préparation</a>
    <h1 style="margin-top: 6px;">Banque de QCM</h1>
  </div>
</header>

<div class="filters">
  <div class="filter-group">
    <label>Chapitre</label>
    <select id="filterChapter">
      <option value="">Tous (1–11)</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Set</label>
    <select id="filterSet">
      <option value="">Tous</option>
      <option value="main">Set principal (40)</option>
      <option value="additional">Set additionnel (27)</option>
    </select>
  </div>
  <div class="filter-group">
    <label>K-level</label>
    <select id="filterK">
      <option value="">Tous</option>
      <option value="K1">K1 — Remember</option>
      <option value="K2">K2 — Understand</option>
      <option value="K3">K3 — Apply</option>
      <option value="K4">K4 — Analyze</option>
    </select>
  </div>
  <div class="filter-group" style="flex: 1; min-width: 180px;">
    <label>Recherche</label>
    <input type="text" id="searchInput" placeholder="Mot-clé dans la question…">
  </div>
  <div style="display: flex; gap: 8px; align-self: flex-end;">
    <button class="ghost" onclick="resetAll()">Tout reset</button>
    <button class="primary" onclick="revealAll()">Révéler tout</button>
  </div>
</div>

<div class="stats-bar" id="statsBar">Chargement…</div>

<div id="qList"></div>

</div>

<script src="data.js"></script>
<script src="lesson-modal.js"></script>
<script>
  const STORAGE_KEY = 'ctai_practice_v1';

  // Populate chapter filter
  const chSel = document.getElementById('filterChapter');
  CTAI_DATA.chapters.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.num;
    opt.textContent = `Ch.${c.num} — ${c.title}`;
    chSel.appendChild(opt);
  });

  // State of selections per question (session-level only)
  let answers = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  const letters = ['a','b','c','d','e'];

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(answers));
  }

  function getFilteredQuestions() {
    const ch = document.getElementById('filterChapter').value;
    const set = document.getElementById('filterSet').value;
    const kl = document.getElementById('filterK').value;
    const search = document.getElementById('searchInput').value.toLowerCase().trim();
    return CTAI_DATA.questions.filter(q => {
      if (ch && q.chapter != ch) return false;
      if (set && q.set !== set) return false;
      if (kl && q.kLevel !== kl) return false;
      if (search && !q.stem.toLowerCase().includes(search) && !q.options.some(o => o.toLowerCase().includes(search))) return false;
      return true;
    });
  }

  function renderQuestions() {
    const qs = getFilteredQuestions();
    const list = document.getElementById('qList');
    list.innerHTML = '';

    // Update stats
    const answered = qs.filter(q => answers[q.id] && answers[q.id].submitted).length;
    const correct = qs.filter(q => {
      const a = answers[q.id];
      if (!a || !a.submitted) return false;
      const sel = (a.selected || []).slice().sort().join(',');
      const ok = q.correct.slice().sort().join(',');
      return sel === ok;
    }).length;
    const sb = document.getElementById('statsBar');
    sb.innerHTML = `<span>${qs.length} question(s) affichée(s)</span><span>${answered} répondue(s) — ${correct} correcte(s) ${answered ? '('+Math.round(correct/answered*100)+'%)' : ''}</span>`;

    if (qs.length === 0) {
      list.innerHTML = '<div class="empty-state">Aucune question avec ces filtres.</div>';
      return;
    }

    qs.forEach(q => {
      const card = document.createElement('div');
      card.className = 'question-card';
      card.id = 'q-' + q.id;

      const a = answers[q.id] || { selected: [], submitted: false };
      const submitted = a.submitted;

      const optsHTML = q.options.map((opt, i) => {
        const letter = letters[i];
        const selected = (a.selected || []).includes(letter);
        const isCorrect = q.correct.includes(letter);
        let cls = '';
        if (submitted) {
          if (isCorrect) cls = 'correct';
          else if (selected) cls = 'wrong';
        } else if (selected) {
          cls = 'selected';
        }
        return `<li class="${cls}" onclick="toggleOption(${q.id}, '${letter}')"><span class="opt-letter">${letter})</span><span>${opt}</span></li>`;
      }).join('');

      const justHTML = q.justifications.map((j, i) => {
        const letter = letters[i];
        const isCorrect = q.correct.includes(letter);
        return `<div class="just-item ${isCorrect ? 'correct' : 'incorrect'}"><strong>${letter})</strong> ${j}</div>`;
      }).join('');

      const setLabel = q.set === 'main' ? 'Main' : 'Add.';
      const setNum = q.set === 'main' ? q.id : q.id - 40;
      const ptsLabel = q.points > 1 ? `${q.points} pts` : '1 pt';
      const multiBadge = q.multi ? `<span class="badge multi">Sélectionner PLUSIEURS (${q.correct.length})</span>` : '';

      card.innerHTML = `
        <div class="q-header">
          <span class="badge">Ch.${q.chapter}</span>
          <span class="badge lo">${q.lo}</span>
          <span class="badge ${q.kLevel.toLowerCase()}">${q.kLevel}</span>
          <span class="badge">${setLabel} #${setNum}</span>
          <span class="badge">${ptsLabel}</span>
          ${multiBadge}
        </div>
        <div class="q-stem">${q.stem}</div>
        <ul class="q-options">${optsHTML}</ul>
        <div class="q-lesson-link" style="margin-bottom:8px;">
          <button class="lm-trigger" style="font-size:12px;" onclick="LessonModal.open(${q.chapter})">📖 Relire la leçon Ch.${q.chapter}</button>
        </div>
        <div class="q-actions">
          ${!submitted ? `<button class="primary" onclick="submitQ(${q.id})">Valider</button><button class="ghost" onclick="showAnswer(${q.id})">Voir réponse</button>` : `<button class="ghost" onclick="resetQ(${q.id})">Recommencer</button>`}
        </div>
        <div class="q-justifications ${submitted ? 'visible' : ''}">${justHTML}</div>
      `;
      list.appendChild(card);
    });
  }

  function toggleOption(qid, letter) {
    const q = CTAI_DATA.questions.find(x => x.id === qid);
    const a = answers[qid] || { selected: [], submitted: false };
    if (a.submitted) return;
    if (q.multi) {
      if (a.selected.includes(letter)) {
        a.selected = a.selected.filter(x => x !== letter);
      } else {
        a.selected.push(letter);
      }
    } else {
      a.selected = [letter];
    }
    answers[qid] = a;
    saveState();
    renderQuestions();
  }

  function submitQ(qid) {
    answers[qid] = answers[qid] || { selected: [], submitted: false };
    answers[qid].submitted = true;
    saveState();
    renderQuestions();
  }

  function showAnswer(qid) {
    answers[qid] = answers[qid] || { selected: [], submitted: false };
    answers[qid].submitted = true;
    saveState();
    renderQuestions();
  }

  function resetQ(qid) {
    delete answers[qid];
    saveState();
    renderQuestions();
  }

  function revealAll() {
    getFilteredQuestions().forEach(q => {
      answers[q.id] = answers[q.id] || { selected: [], submitted: false };
      answers[q.id].submitted = true;
    });
    saveState();
    renderQuestions();
  }

  function resetAll() {
    if (confirm('Effacer toutes les réponses ?')) {
      answers = {};
      saveState();
      renderQuestions();
    }
  }

  ['filterChapter','filterSet','filterK','searchInput'].forEach(id => {
    document.getElementById(id).addEventListener('input', renderQuestions);
  });

  renderQuestions();
</script>
<script type="module" src="motion-animations.js"></script>
</body>
</html>
